<div class="notification-center" (click)="onPanelClick($event)">
  <button
    type="button"
    class="notification-trigger"
    aria-label="Open notifications"
    (click)="toggleDropdown(); $event.stopPropagation()">

    <svg viewBox="0 0 24 24" class="bell-icon" aria-hidden="true">
      <path
        d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6h-1V11a6 6 0 1 0-12 0v5H5a1 1 0 0 0 0 2h14a1 1 0 1 0 0-2Z"
        fill="currentColor" />
    </svg>

    @if (unreadCount() > 0) {
      <span class="notification-badge">{{ unreadCount() }}</span>
    }
  </button>

  @if (isOpen()) {
    <div class="notification-dropdown">
      <div class="dropdown-head">
        <div>
          <p class="dropdown-eyebrow">Alerts</p>
          <h3>Notification Center</h3>
        </div>

        @if (unreadCount() > 0) {
          <button
            type="button"
            class="mark-read-btn"
            (click)="markAllAsRead()">
            Mark all as read
          </button>
        }
      </div>

      <div class="notification-list">
        @for (item of notifications(); track trackById($index, item)) {
          <article
            class="notification-item"
            [class.unread]="item.unread"
            (click)="markAsRead(item.id)">

            <span class="notification-dot" [class]="item.type"></span>

            <div class="notification-copy">
              <div class="notification-topline">
                <strong>{{ item.title }}</strong>
                <span>{{ item.time }}</span>
              </div>
              <p>{{ item.message }}</p>
            </div>
          </article>
        }
      </div>
    </div>
  }
</div>
