<header class="header-bar">
  <div class="header-copy">
    <p class="page-kicker">Enterprise visibility</p>
    <h2>Welcome back, {{ displayName() }}</h2>
  </div>

  <div class="header-actions">
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search teams, reports, or alerts" />
      </div>
    </div>

    <div class="topbar-utilities">
      <app-notification-center></app-notification-center>

      <button
        type="button"
        class="theme-toggle-btn"
        (click)="toggleTheme()"
        [attr.aria-label]="isDarkTheme() ? 'Switch to light mode' : 'Switch to dark mode'">
        <span>{{ isDarkTheme() ? '☀️' : '🌙' }}</span>
        <span>{{ isDarkTheme() ? 'Light' : 'Dark' }}</span>
      </button>

      <span class="role-pill">{{ roleLabel() }}</span>

      <div class="profile-menu-shell">
        <button type="button" class="profile-trigger" (click)="toggleProfileMenu()">
          <span class="profile-avatar">{{ initials() }}</span>
          <span class="profile-copy">
            <strong>{{ displayName() }}</strong>
          </span>
          <span class="profile-caret">▾</span>
        </button>

        @if (profileMenuOpen()) {
          <div class="profile-menu">
            <a routerLink="/profile" class="menu-item" (click)="closeProfileMenu()">My profile</a>
            <button type="button" class="menu-item" (click)="toggleTheme()">Toggle theme</button>
            <button type="button" class="menu-item danger" (click)="logout()">Logout</button>
          </div>
        }
      </div>
    </div>
  </div>
</header>
