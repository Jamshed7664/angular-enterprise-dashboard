@if (visible) {
  <div class="dialog-backdrop" (click)="close()"></div>
  <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="userDialogTitle">
    <div class="dialog-header">
      <div>
        <p class="eyebrow">User management</p>
        <h2 id="userDialogTitle">{{ dialogTitle() }}</h2>
      </div>
      <button type="button" class="icon-btn" (click)="close()">✕</button>
    </div>

    <form class="dialog-form" [formGroup]="form" (ngSubmit)="save()">
      <div class="field-grid">
        <label class="field">
          <span>Full name</span>
          <input type="text" formControlName="name" placeholder="Aarav Sharma" />
        </label>

        <label class="field">
          <span>Email address</span>
          <input type="email" formControlName="email" placeholder="aarav@axionops.com" />
        </label>

        <label class="field">
          <span>Role</span>
          <select formControlName="role">
            @for (role of roles; track role) {
              <option [value]="role">{{ role | titlecase }}</option>
            }
          </select>
        </label>

        <label class="field">
          <span>Status</span>
          <select formControlName="status">
            @for (status of statuses; track status) {
              <option [value]="status">{{ status | titlecase }}</option>
            }
          </select>
        </label>

        <label class="field">
          <span>Team</span>
          <input type="text" formControlName="team" placeholder="Platform Ops" />
        </label>

        <label class="field">
          <span>Job title</span>
          <input type="text" formControlName="title" placeholder="Operations Manager" />
        </label>

        <label class="field">
          <span>Avatar initials</span>
          <input type="text" formControlName="avatar" maxlength="2" placeholder="AS" />
        </label>

        <label class="field">
          <span>Last active</span>
          <input type="date" formControlName="lastActive" />
        </label>
      </div>

      <div class="dialog-actions">
        <button type="button" class="btn-secondary" (click)="close()">Cancel</button>
        <button type="submit" class="btn-primary">Save user</button>
      </div>
    </form>
  </section>
}
